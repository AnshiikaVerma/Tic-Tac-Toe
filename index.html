<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tack Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>


<body>


    <!-- <nav>
        <ul>
            <li>My_Tic_Tac_toe.com</li>

    <nav class="navbar sticky-top ">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">TickTackToe.com</a>
  </div>
</nav>
<div class="btnContainer"><button type="button"  id="start"   class="btn btn-outline-success btn-lg"> Start Game</button>
   </div>
   

<div class="gameContainer">
   
    <!-- game part -->
<div class="container">
    <div class="box bt-0 bl-0"><span class="boxText"></span></div>
     <div class="box bt-0"><span class="boxText"></span></div>
      <div class="box bt-0 br-0"><span class="boxText"></span></div>
       <div class="box bl-0"><span class="boxText"></span></div>
        <div class="box"><span class="boxText"></span></div>
         <div class="box br-0"><span class="boxText"></span></div>
          <div class="box bl-0 bb-0"><span class="boxText"></span></div>
           <div class="box  bb-0"><span class="boxText"></span></div>
            <div class="box bb-0 br-0"><span class="boxText"></span></div>
</div>
<!-- game information -->
<div class="gameInfo">
     <h1>Welcome to My TicTacTOe</h1>
    <div>
         <span class="info"></span>
    <button id="reset">Reset</button>
    </div>
   
   <div class="imgBox">
    <img src="happy-cat-happy-happy-cat.gif" alt="happy" >
   </div>
</div>

</div>

</body>
